<!DOCTYPE html>
<html>
<body>
  <svg width="400" height="400" viewBox="0 0 100 100">
    <!-- Scalloped Border (Gold) -->
    <path id="scallop" fill="none" stroke="#cca341" stroke-width="2.5" />
    
    <!-- Vertical S (Sharp points) -->
    <path d="M 50 15 C 65 25, 60 40, 50 50 C 40 60, 35 75, 50 85 C 65 75, 60 60, 50 50 C 40 40, 35 25, 50 15 Z" fill="none" stroke="#2f5d4a" stroke-width="3" />
    
    <!-- Horizontal S (Sharp points) -->
    <path d="M 85 50 C 75 65, 60 60, 50 50 C 40 40, 25 35, 15 50 C 25 65, 40 60, 50 50 C 60 40, 75 35, 85 50 Z" fill="none" stroke="#2f5d4a" stroke-width="3" />
    
    <!-- Diagonal petals (Top-Right) -->
    <path d="M 50 50 C 58 46, 68 38, 75 25 C 62 32, 54 42, 50 50 Z" fill="none" stroke="#2f5d4a" stroke-width="3" />
    <!-- Diagonal petals (Top-Left) -->
    <path d="M 50 50 C 42 46, 32 38, 25 25 C 38 32, 46 42, 50 50 Z" fill="none" stroke="#2f5d4a" stroke-width="3" />
    <!-- Diagonal petals (Bottom-Right) -->
    <path d="M 50 50 C 58 54, 68 62, 75 75 C 62 68, 54 58, 50 50 Z" fill="none" stroke="#2f5d4a" stroke-width="3" />
    <!-- Diagonal petals (Bottom-Left) -->
    <path d="M 50 50 C 42 54, 32 62, 25 75 C 38 68, 46 58, 50 50 Z" fill="none" stroke="#2f5d4a" stroke-width="3" />
  </svg>
  <script>
    const cx = 50, cy = 50, numLobes = 12, rInner = 40, rOuter = 46;
    let d = "";
    for (let i = 0; i < numLobes; i++) {
      const a1 = (i * 360) / numLobes * Math.PI / 180;
      const a2 = ((i + 0.5) * 360) / numLobes * Math.PI / 180;
      const a3 = ((i + 1) * 360) / numLobes * Math.PI / 180;
      
      const x1 = cx + rInner * Math.sin(a1);
      const y1 = cy - rInner * Math.cos(a1);
      const x2 = cx + rOuter * Math.sin(a2);
      const y2 = cy - rOuter * Math.cos(a2);
      const x3 = cx + rInner * Math.sin(a3);
      const y3 = cy - rInner * Math.cos(a3);
      
      if (i === 0) d += \`M \${x1} \${y1} \`;
      d += \`Q \${x2} \${y2} \${x3} \${y3} \`;
    }
    document.getElementById('scallop').setAttribute('d', d);
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<body>
  <svg width="400" height="400" viewBox="0 0 100 100">
    <!-- Scalloped Border (Gold) -->
    <path id="scallop" fill="none" stroke="#cca341" stroke-width="3" />
    
    <!-- Vertical S -->
    <path d="M 50 20 C 70 20, 65 50, 50 50 C 35 50, 30 80, 50 80 C 30 80, 35 50, 50 50 C 65 50, 70 20, 50 20 Z" fill="none" stroke="#2f5d4a" stroke-width="3" />
    
    <!-- Horizontal S -->
    <path d="M 80 50 C 80 70, 50 65, 50 50 C 50 35, 20 30, 20 50 C 20 30, 50 35, 50 50 C 50 65, 80 70, 80 50 Z" fill="none" stroke="#2f5d4a" stroke-width="3" />
    
    <!-- Diagonal petals (shorter) -->
    <path d="M 50 50 Q 65 35 70 30 Q 75 35 50 50" fill="none" stroke="#2f5d4a" stroke-width="3" />
  </svg>
  <script>
    const cx = 50, cy = 50, numLobes = 12, rInner = 38, rOuter = 46;
    let d = "";
    for (let i = 0; i < numLobes; i++) {
      const a1 = (i * 360) / numLobes * Math.PI / 180;
      const a2 = ((i + 0.5) * 360) / numLobes * Math.PI / 180;
      const a3 = ((i + 1) * 360) / numLobes * Math.PI / 180;
      
      const x1 = cx + rInner * Math.sin(a1);
      const y1 = cy - rInner * Math.cos(a1);
      const x2 = cx + rOuter * Math.sin(a2);
      const y2 = cy - rOuter * Math.cos(a2);
      const x3 = cx + rInner * Math.sin(a3);
      const y3 = cy - rInner * Math.cos(a3);
      
      if (i === 0) d += \`M \${x1} \${y1} \`;
      d += \`Q \${x2} \${y2} \${x3} \${y3} \`;
    }
    document.getElementById('scallop').setAttribute('d', d);
  </script>
</body>
</html>

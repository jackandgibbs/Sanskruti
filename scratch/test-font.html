<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Rozha+One&display=swap" rel="stylesheet">
<style>
  body { background: #f8f4ea; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;}
  .logo { font-family: 'Rozha One', serif; font-size: 80px; color: #2a513d; position: relative; display: inline-block; }
  /* Adjusting dot placement to be over the vertical stem of the first character 'स' */
  .dot { position: absolute; width: 0.12em; height: 0.12em; background-color: #cda63f; border-radius: 50%; top: 0.22em; left: 0.52em; }
  .subtext { font-family: sans-serif; font-size: 20px; color: #cda63f; text-align: center; font-weight: bold; }
</style>
</head>
<body>
  <div>
    <div class="logo">सस्कृति<div class="dot"></div></div>
    <div class="subtext">वीमेन्स<br>एथनिक वेयर</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<body>
  <svg width="400" height="400" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#f8f4ea" />
    
    <!-- Scalloped Border (Gold) -->
    <!-- Sharp inward points! -->
    <path id="scallop" fill="none" stroke="#cca341" stroke-width="4" />
    
    <g stroke="#2f5d4a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <!-- Vertical S -->
      <path d="M 50 16 C 65 20, 60 38, 50 50 C 40 62, 35 80, 50 84 C 65 80, 60 62, 50 50 C 40 38, 35 20, 50 16 Z" fill="none" />
      
      <!-- Horizontal S -->
      <path d="M 84 50 C 80 65, 62 60, 50 50 C 38 40, 20 35, 16 50 C 20 65, 38 60, 50 50 C 62 40, 80 35, 84 50 Z" fill="none" />
      
      <!-- Diagonal petals (Floating!) -->
      <!-- Top Right -->
      <path d="M 58 42 C 64 38, 68 34, 74 26 C 66 32, 62 36, 58 42 Z" fill="none" />
      <!-- Top Left -->
      <path d="M 42 42 C 36 38, 32 34, 26 26 C 34 32, 38 36, 42 42 Z" fill="none" />
      <!-- Bottom Right -->
      <path d="M 58 58 C 64 62, 68 66, 74 74 C 66 68, 62 64, 58 58 Z" fill="none" />
      <!-- Bottom Left -->
      <path d="M 42 58 C 36 62, 32 66, 26 74 C 34 68, 38 64, 42 58 Z" fill="none" />
    </g>
  </svg>
  <script>
    const cx = 50, cy = 50, numLobes = 12, rInner = 36, rArc = 14.5;
    let d = "";
    for (let i = 0; i < numLobes; i++) {
      const a1 = (i * 360) / numLobes * Math.PI / 180;
      const a2 = ((i + 1) * 360) / numLobes * Math.PI / 180;
      
      const x1 = cx + rInner * Math.sin(a1);
      const y1 = cy - rInner * Math.cos(a1);
      const x2 = cx + rInner * Math.sin(a2);
      const y2 = cy - rInner * Math.cos(a2);
      
      if (i === 0) d += \`M \${x1} \${y1} \`;
      // A rx ry x-axis-rotation large-arc-flag sweep-flag x y
      d += \`A \${rArc} \${rArc} 0 0 1 \${x2} \${y2} \`;
    }
    document.getElementById('scallop').setAttribute('d', d);
  </script>
</body>
</html>
